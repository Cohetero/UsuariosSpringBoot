openapi: 3.0.0

info:
  title: API de Usuarios con JWT
  description: API REST para gestión de usuarios con autenticación JWT
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Servidor local

paths:
  /login:
    post:
      summary: Iniciar sesión
      description: Genera un token JWT
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: 1234
      responses:
        "200":
          description: Token generado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiJ9...

  /usuario/listar:
    get:
      summary: Obtener todos los usuarios
      description: Retorna la lista de usuarios registrados
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Usuario"

  /usuario/buscar/{id}:
    get:
      summary: Buscar usuario por ID
      description: Retorna un usuario específico mediante su ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usuario"

  /usuario/guardar:
    post:
      summary: Guardar nuevo usuario
      description: Registra un nuevo usuario en la base de datos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Usuario"
      responses:
        "201":
          description: Usuario creado correctamente

  /usuario/editar/{id}:
    put:
      summary: Editar usuario
      description: Actualiza un usuario existente mediante su ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Usuario"
      responses:
        "200":
          description: Usuario actualizado correctamente

  /usuario/eliminar/{id}:
    delete:
      summary: Eliminar usuario
      description: Elimina un usuario mediante su ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
      responses:
        "200":
          description: Usuario eliminado correctamente

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Usuario:
      type: object
      properties:
        nombre:
          type: string
          example: Mauricio Cohetero

        email:
          type: string
          example: mauriciocohetero@gmail.com

        password:
          type: string
          example: 1234

        telefono:
          type: string
          example: 2221234567

        fechaRegistro:
          type: string
          format: date-time
          example: 2026-04-14T17:04:16.880756
